<!DOCTYPE html>
<html>

<head>
    <title>Teste Admin Panel</title>
</head>

<body>
    <h1>Validação Admin Panel</h1>
    <div id="results"></div>

    <script>
        // Carregar e validar o admin index.html
        fetch('admin/index.html')
            .then(r => r.text())
            .then(html => {
                // Extrair o script
                const scriptMatch = html.match(/<script>/i);
                const scriptEndMatch = html.match(/<\/script>/i);

                if (!scriptMatch || !scriptEndMatch) {
                    document.getElementById('results').innerHTML += '<p style="color: red;">❌ Script tags não encontradas</p>';
                    return;
                }

                document.getElementById('results').innerHTML += '<p style="color: green;">✅ Script tags encontradas</p>';

                // Procurar por problemas comuns
                const issues = [];

                // Procurar por template literals escapadas
                if (html.includes('\\${')) {
                    issues.push('Template literal com escape encontrada');
                }

                // Procurar por backticks não fechadas
                const backticks = html.split('`').length - 1;
                if (backticks % 2 !== 0) {
                    issues.push(`Backticks não equilibradas: ${backticks}`);
                }

                if (issues.length > 0) {
                    document.getElementById('results').innerHTML += `<p style="color: orange;">⚠️ Possíveis problemas encontrados:</p><ul>`;
                    issues.forEach(i => {
                        document.getElementById('results').innerHTML += `<li>${i}</li>`;
                    });
                    document.getElementById('results').innerHTML += '</ul>';
                } else {
                    document.getElementById('results').innerHTML += '<p style="color: green;">✅ Sem problemas óbvios detectados</p>';
                }
            })
            .catch(err => {
                document.getElementById('results').innerHTML = `<p style="color: red;">❌ Erro ao carregar: ${err.message}</p>`;
            });
    </script>
</body>

</html>
