name: Cache Bust on Deploy

on:
  push:
    branches: [main]

jobs:
  bust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update cache version
        run: |
          DATE=$(date +%Y%m%d%H%M)
          sed -i "s/?v=[0-9]*/\?v=$DATE/g" index.html

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: cache bust $DATE"
          git push
