<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelar Reserva - 24.7 Barbearia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 3rem 2rem;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 1rem;
        }

        .logo span {
            color: #d4af37;
        }

        h1 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 1rem;
        }

        .message {
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            font-size: 1rem;
            line-height: 1.6;
        }

        .loading {
            background: #e3f2fd;
            color: #1976d2;
            border: 2px solid #1976d2;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #f44336;
        }

        .info {
            background: #f5f5f5;
            color: #555;
            text-align: left;
            margin-top: 1rem;
        }

        .info strong {
            color: #333;
        }

        .back-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: #d4af37;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #c49d2e;
            transform: translateY(-2px);
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1976d2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">24.<span>7</span> Barbearia</div>
        <h1>Cancelar Reserva</h1>

        <div id="content">
            <div class="message loading">
                <div class="spinner"></div>
                <p>A processar o seu pedido...</p>
            </div>
        </div>

        <a href="index_clean.html" class="back-btn">Voltar ao Site</a>
    </div>

    <script>
        const API_BASE_URL = 'https://two4-7-barbearia.onrender.com/api';

        async function cancelReservation() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                showError('Link inválido. Token não encontrado.');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/reservations/cancel/${token}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao cancelar reserva');
                }

                showSuccess(data);
            } catch (error) {
                showError(error.message);
            }
        }

        function showSuccess(data) {
            const content = document.getElementById('content');
            const date = new Date(data.reservation.date);

            content.innerHTML = `
                <div class="message success">
                    <h2 style="margin-bottom: 0.5rem;">✅ Reserva Cancelada!</h2>
                    <p>A sua reserva foi cancelada com sucesso.</p>
                </div>
                <div class="info">
                    <p><strong>Cliente:</strong> ${data.reservation.clientName}</p>
                    <p><strong>Serviço:</strong> ${data.reservation.serviceName}</p>
                    <p><strong>Data:</strong> ${date.toLocaleDateString('pt-PT')}</p>
                    <p><strong>Hora:</strong> ${data.reservation.time}</p>
                </div>
            `;
        }

        function showError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="message error">
                    <h2 style="margin-bottom: 0.5rem;">❌ Erro</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        // Execute on page load
        window.onload = cancelReservation;
    </script>
</body>

</html>
