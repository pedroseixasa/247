<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelar Reserva - 24.7 Barbearia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #1f2933;
        }

        .container {
            background: #ffffff;
            border-radius: 14px;
            border: 1px solid #e4e7eb;
            box-shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
            max-width: 520px;
            width: 100%;
            padding: 32px 28px;
            text-align: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.75rem;
        }

        .logo span {
            color: #a1731b;
        }

        h1 {
            font-size: 1.2rem;
            color: #374151;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .message {
            padding: 16px;
            border-radius: 10px;
            margin: 16px 0;
            font-size: 0.95rem;
            line-height: 1.6;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .status {
            padding: 14px 16px;
            border-radius: 10px;
            margin: 16px 0;
            text-align: left;
            border-left: 4px solid #9aa5b1;
            background: #f8fafc;
        }

        .status-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #111827;
        }

        .status.success {
            border-left-color: #2f855a;
        }

        .status.error {
            border-left-color: #c53030;
        }

        .info {
            background: #f8fafc;
            color: #4b5563;
            text-align: left;
            margin-top: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 0.9rem;
        }

        .info strong {
            color: #111827;
            font-weight: 600;
        }

        .back-btn {
            display: inline-block;
            margin-top: 1.25rem;
            padding: 0.7rem 1.5rem;
            background: #111827;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .back-btn:hover {
            background: #1f2937;
            transform: translateY(-1px);
        }

        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #6b7280;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .container {
                padding: 24px 18px;
            }

            .logo {
                font-size: 1.4rem;
            }

            h1 {
                font-size: 1.05rem;
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">24.7 Barbearia</div>
        <h1>Cancelar Reserva</h1>

        <div id="content">
            <div class="message loading">
                <div class="spinner"></div>
                <p>A processar o seu pedido...</p>
            </div>
        </div>

    </div>

    <script>
        const API_BASE_URL = 'https://two4-7-barbearia.onrender.com/api';

        async function cancelReservation() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                showError('Link inválido. Token não encontrado.');
                return;
            }

            showConfirm(token);
        }

        async function confirmCancellation(token) {
            try {
                const response = await fetch(`${API_BASE_URL}/reservations/cancel/${token}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao cancelar reserva');
                }

                showSuccess(data);
            } catch (error) {
                showError(error.message);
            }
        }

        function showConfirm(token) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="status">
                    <div class="status-title">Confirmar cancelamento</div>
                    <p>Tem a certeza que quer cancelar esta reserva?</p>
                </div>
                <div style="display:flex; gap:12px; justify-content:center; margin-top:12px; flex-wrap:wrap;">
                    <button id="confirmCancel" class="back-btn" style="background:#c53030;">Cancelar Reserva</button>
                </div>
            `;

            const confirmBtn = document.getElementById('confirmCancel');
            if (confirmBtn) {
                confirmBtn.addEventListener('click', function () {
                    content.innerHTML = `
                        <div class="message loading">
                            <div class="spinner"></div>
                            <p>A cancelar a reserva...</p>
                        </div>
                    `;
                    confirmCancellation(token);
                });
            }
        }

        function showSuccess(data) {
            const content = document.getElementById('content');
            const date = new Date(data.reservation.date);

            content.innerHTML = `
                <div class="status success">
                    <div class="status-title">Reserva cancelada</div>
                    <p>A sua reserva foi cancelada com sucesso.</p>
                </div>
                <div class="info">
                    <p><strong>Cliente:</strong> ${data.reservation.clientName}</p>
                    <p><strong>Serviço:</strong> ${data.reservation.serviceName}</p>
                    <p><strong>Data:</strong> ${date.toLocaleDateString('pt-PT')}</p>
                    <p><strong>Hora:</strong> ${data.reservation.time}</p>
                </div>
            `;
        }

        function showError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="status error">
                    <div class="status-title">Nao foi possivel cancelar</div>
                    <p>${message}</p>
                </div>
            `;
        }

        // Execute on page load
        window.onload = cancelReservation;
    </script>
</body>

</html>
