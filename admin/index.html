<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Barbearia 24.7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --secondary: #ffffff;
            --accent: #ff6b35;
            --border: #e0e0e0;
            --text-light: #666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #eeeeee 100%);
            color: var(--primary);
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: var(--primary);
            color: var(--secondary);
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 0 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .sidebar-menu {
            list-style: none;
            margin-top: 1rem;
        }

        .sidebar-menu li {
            margin: 0;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a .emoji {
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            color: var(--secondary);
            background: rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--secondary);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2rem;
            color: var(--primary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logout-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #e55a24;
            transform: translateY(-2px);
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--secondary);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-top: 3px solid var(--accent);
        }

        .card h3 {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        /* Tables */
        .table-container {
            background: var(--secondary);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f9f9f9;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: #fafafa;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #e55a24;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--secondary);
            padding: 2rem;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            padding: 0;
            width: 30px;
            height: 30px;
        }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .reservations-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .reservation-day {
            margin-bottom: 1.5rem;
        }

        .reservation-day-header {
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--primary);
        }

        .reservation-list {
            display: grid;
            gap: 0.75rem;
        }

        .reservation-card {
            background: var(--secondary);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: grid;
            grid-template-columns: 90px 1fr 140px 100px;
            gap: 1rem;
            align-items: center;
            border-left: 4px solid var(--accent);
        }

        .reservation-time {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
        }

        .reservation-service {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .reservation-meta {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .reservation-status {
            text-align: right;
        }

        .reservation-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .btn-action {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: #dc3545;
            color: white;
        }

        .btn-cancel:hover {
            background: #c82333;
        }

        /* Login Page */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, #333 100%);
        }

        .login-box {
            background: var(--secondary);
            padding: 2rem;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        .login-box .form-group {
            margin-bottom: 1rem;
        }

        /* Responsivo */
        @media (max-width: 1024px) {
            .sidebar {
                width: 70px;
            }

            .sidebar-logo {
                font-size: 0;
                padding: 1rem;
            }

            .sidebar-logo::before {
                content: '24.7';
                font-size: 1.25rem;
            }

            .sidebar-menu a {
                padding: 1rem;
                font-size: 1.25rem;
                text-align: center;
            }

            .sidebar-menu a span:not(.emoji) {
                display: none;
            }

            .main-content {
                margin-left: 70px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                top: auto;
                width: 100%;
                height: 70px;
                z-index: 1000;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                border-right: none;
            }

            .sidebar-logo {
                display: none;
            }

            .sidebar-menu {
                display: flex;
                flex-direction: row;
                justify-content: space-around;
                margin: 0;
                height: 100%;
            }

            .sidebar-menu li {
                flex: 1;
            }

            .sidebar-menu a {
                padding: 0.75rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-size: 1.5rem;
                gap: 0.25rem;
                height: 100%;
                border-left: none;
                border-top: 3px solid transparent;
            }

            .sidebar-menu a:hover,
            .sidebar-menu a.active {
                border-left-color: transparent;
                border-top-color: var(--accent);
            }

            .sidebar-menu a span:not(.emoji) {
                font-size: 0.65rem;
                display: block;
            }

            .main-content {
                margin-left: 0;
                margin-bottom: 70px;
                padding: 1rem;
            }

            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .cards-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .reservation-card {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 1rem;
            }

            .reservation-time {
                text-align: left;
                font-size: 1.5rem;
            }

            .reservation-status,
            .reservation-actions {
                text-align: left;
                justify-content: flex-start;
            }

            .reservation-actions {
                flex-wrap: wrap;
            }

            .table-container {
                overflow-x: auto;
            }

            table {
                font-size: 0.85rem;
            }

            th,
            td {
                padding: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 0.75rem;
            }

            header {
                padding: 0.75rem;
            }

            .user-info {
                font-size: 0.875rem;
            }

            .logout-btn {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }

            .btn-action {
                padding: 0.35rem 0.6rem;
                font-size: 0.75rem;
            }

            .reservation-day-header {
                font-size: 0.9rem;
                padding: 0.75rem;
            }

            .reservation-card {
                padding: 0.75rem;
            }

            .reservation-service {
                font-size: 0.95rem;
            }

            .reservation-meta {
                font-size: 0.8rem;
            }
        }

        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #e7f3ff;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .floating-save-btn {
            position: fixed;
            right: 2rem;
            bottom: 2rem;
            z-index: 1200;
            padding: 0.85rem 1.6rem;
            background: #ff6b35;
            color: #fff;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 10px 24px rgba(255, 107, 53, 0.35);
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
        }

        .floating-save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(255, 107, 53, 0.45);
        }

        .floating-save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .status-modal.active {
            display: flex;
        }

        .status-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
        }

        .status-modal-content {
            position: relative;
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem 1.75rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .status-modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .status-modal-message {
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 1.25rem;
            line-height: 1.5;
        }

        .status-modal-actions {
            display: flex;
            justify-content: flex-end;
        }

        .status-modal-close {
            padding: 0.5rem 1.25rem;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .status-modal[data-type="success"] .status-modal-title {
            color: #1b5e20;
        }

        .status-modal[data-type="error"] .status-modal-title {
            color: #b71c1c;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <script>
        const API_URL = "https://two4-7-barbearia.onrender.com/api";
        let token = localStorage.getItem('admin_token');
        let currentUser = JSON.parse(localStorage.getItem('admin_user') || '{}');

        // Login
        if (!token) {
            showLoginPage();
        } else {
            showAdminPanel();
        }

        function showLoginPage() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <h1>🔐 Painel Admin</h1>
                        <form id="loginForm">
                            <div class="form-group">
                                <label>Email:</label>
                                <input type="email" id="email" required />
                            </div>
                            <div class="form-group">
                                <label>Password:</label>
                                <input type="password" id="password" required />
                            </div>
                            <div id="alertBox"></div>
                            <button type="submit" style="width: 100%;">Login</button>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        showAlert('alertBox', data.error, 'error');
                        return;
                    }

                    token = data.token;
                    currentUser = data.barber;
                    localStorage.setItem('admin_token', token);
                    localStorage.setItem('admin_user', JSON.stringify(currentUser));

                    showAdminPanel();
                } catch (error) {
                    showAlert('alertBox', 'Erro ao conectar: ' + error.message, 'error');
                }
            });
        }

        function showAdminPanel() {
            const isAdmin = currentUser.role === 'admin';
            const menuItems = isAdmin
                ? `
                    <li><a href="#dashboard" class="menu-link active"><span class="emoji">📊</span><span>Dashboard</span></a></li>
                    <li><a href="#reservations" class="menu-link"><span class="emoji">📅</span><span>Reservas</span></a></li>
                    <li><a href="#services" class="menu-link"><span class="emoji">✂️</span><span>Serviços</span></a></li>
                    <li><a href="#settings" class="menu-link"><span class="emoji">⚙️</span><span>Config</span></a></li>
                    <li><a href="#change-password" class="menu-link"><span class="emoji">🔐</span><span>Password</span></a></li>
                `
                : `
                    <li><a href="#reservations" class="menu-link active"><span class="emoji">📅</span><span>Reservas</span></a></li>
                    <li><a href="#change-password" class="menu-link"><span class="emoji">🔐</span><span>Password</span></a></li>
                `;

            const panelTitle = isAdmin ? '24.7 Admin' : '24.7 Painel';

            document.getElementById('app').innerHTML = `
                <div class="container">
                    <aside class="sidebar">
                        <div class="sidebar-logo">${panelTitle}</div>
                        <ul class="sidebar-menu">
                            ${menuItems}
                        </ul>
                    </aside>

                    <main class="main-content">
                        <header>
                            <h1 id="pageTitle">${isAdmin ? 'Dashboard' : 'Minhas Reservas'}</h1>
                            <div class="user-info">
                                <span>Olá, <strong>${currentUser.name}</strong></span>
                                <button class="logout-btn" onclick="logout()">Sair</button>
                            </div>
                        </header>

                        <div id="content"></div>
                    </main>
                </div>
            `;

            if (!document.getElementById('statusModal')) {
                document.body.insertAdjacentHTML('beforeend', `
                    <div id="statusModal" class="status-modal" data-type="success">
                        <div class="status-modal-backdrop" data-close="true"></div>
                        <div class="status-modal-content" role="dialog" aria-live="polite">
                            <div class="status-modal-title" id="statusModalTitle">Estado</div>
                            <div class="status-modal-message" id="statusModalMessage"></div>
                            <div class="status-modal-actions">
                                <button type="button" class="status-modal-close" data-close="true">Fechar</button>
                            </div>
                        </div>
                    </div>
                `);

                document.body.addEventListener('click', (event) => {
                    if (event.target && event.target.getAttribute('data-close') === 'true') {
                        closeStatusModal();
                    }
                });
            }

            // Menu listeners
            document.querySelectorAll('.menu-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = link.getAttribute('href').substring(1);

                    document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');

                    loadPage(page);
                });
            });

            // Carregar página inicial baseado no role
            const initialPage = currentUser.role === 'admin' ? 'dashboard' : 'reservations';
            loadPage(initialPage);
        }

        async function loadPage(page) {
            const pageTitles = {
                'dashboard': '📊 Dashboard',
                'reservations': currentUser.role === 'admin' ? '📅 Reservas' : '📅 Minhas Reservas',
                'services': '✂️ Serviços',
                'settings': '⚙️ Configurações',
                'change-password': '🔐 Mudar Password'
            };

            document.getElementById('pageTitle').textContent = pageTitles[page] || page;

            const content = document.getElementById('content');

            switch (page) {
                case 'dashboard':
                    loadDashboard(content);
                    break;
                case 'reservations':
                    loadReservations(content);
                    break;
                case 'services':
                    loadServices(content);
                    break;
                case 'barbers':
                    loadBarbers(content);
                    break;
                case 'settings':
                    loadSettings(content);
                    break;
                case 'change-password':
                    loadChangePassword(content);
                    break;
            }
        }

        function formatCurrency(value) {
            const amount = Number(value || 0);
            return new Intl.NumberFormat('pt-PT', {
                style: 'currency',
                currency: 'EUR'
            }).format(amount);
        }

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);
            const text = await response.text();
            let data = {};

            if (text) {
                try {
                    data = JSON.parse(text);
                } catch (error) {
                    throw new Error('Resposta inválida do servidor. Reinicia o backend.');
                }
            }

            if (!response.ok) {
                throw new Error(data.error || 'Erro ao comunicar com o servidor');
            }

            return data;
        }

        async function fetchBarbers() {
            return fetchJson(`${API_URL}/admin/barbers`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
        }

        function buildBarberOptions(barbers, selectedId) {
            const defaultOption = `<option value=""${selectedId ? '' : ' selected'}>Todos os barbeiros</option>`;
            const options = barbers.map(barber => {
                const selected = barber._id === selectedId ? ' selected' : '';
                return `<option value="${barber._id}"${selected}>${barber.name}</option>`;
            });
            return [defaultOption].concat(options).join('');
        }

        function buildYearOptions(selectedYear = 0) {
            const now = new Date();
            const currentYear = now.getFullYear();
            const defaultYear = selectedYear || currentYear;

            let html = '';
            for (let year = 2026; year <= currentYear + 5; year++) {
                const selected = year === defaultYear ? ' selected' : '';
                html += `<option value="${year}"${selected}>${year}</option>`;
            }
            return html;
        }

        function buildDashboardUrl(barberId, year) {
            const params = new URLSearchParams();
            if (barberId) {
                params.set('barberId', barberId);
            }
            if (year) {
                params.set('year', year);
            }
            const query = params.toString();
            return query ? `${API_URL}/admin/settings?${query}` : `${API_URL}/admin/settings`;
        }

        async function loadDashboard(container) {
            try {

        async function loadReservations(container) {
            try {
                container.innerHTML = '<p>A carregar reservas...</p>';

                const barbers = currentUser.role === 'admin' ? await fetchBarbers() : [];
                const barberOptions = currentUser.role === 'admin'
                    ? buildBarberOptions(barbers, '')
                    : '';

                const reservations = await fetchJson(`${API_URL}/admin/reservations`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const buildReservationsHtml = (items) => {
                    let html = `
                        <div class="reservations-toolbar">
                            <span><strong>Total:</strong> ${items.length}</span>
                            ${currentUser.role === 'admin' ? `
                                <div style="display:flex; gap:0.75rem; flex-wrap: wrap;">
                                    <select id="reservationsBarberFilter">${barberOptions}</select>
                                    <button id="reservationsApply">Filtrar</button>
                                </div>
                            ` : ''}
                        </div>
                    `;

                    if (!Array.isArray(items) || items.length === 0) {
                        html += '<div class="alert alert-info">Sem reservas registradas.</div>';
                        return html;
                    }

                    const groupedItems = {};
                    items.forEach((reservation) => {
                        const dateObj = new Date(reservation.reservationDate);
                        const dateKey = dateObj.toISOString().split('T')[0];

                        if (!groupedItems[dateKey]) {
                            groupedItems[dateKey] = { date: dateObj, items: [] };
                        }

                        groupedItems[dateKey].items.push(reservation);
                    });

                    const sortedItemKeys = Object.keys(groupedItems).sort(
                        (a, b) => new Date(a) - new Date(b)
                    );

                    sortedItemKeys.forEach((key) => {
                        const group = groupedItems[key];
                        const dateLabel = group.date.toLocaleDateString('pt-PT', {
                            weekday: 'long',
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        });

                        html += `
                            <div class="reservation-day">
                                <div class="reservation-day-header">${dateLabel}</div>
                                <div class="reservation-list">
                        `;

                        group.items
                            .sort((a, b) => (a.timeSlot || '').localeCompare(b.timeSlot || ''))
                            .forEach((reservation) => {
                                // Try to get barber name: first from populated object, then from map, then fallback
                                let barberName = '—';
                                if (reservation.barberId) {
                                    if (typeof reservation.barberId === 'string') {
                                        // barberId is just an ID string - lookup in barbers array
                                        const barber = barbers.find(b => b._id === reservation.barberId);
                                        barberName = barber ? barber.name : '—';
                                    } else if (reservation.barberId.name) {
                                        // barberId is populated object with name
                                        barberName = reservation.barberId.name;
                                    } else if (reservation.barberId._id) {
                                        // barberId is populated but no name - lookup in barbers array
                                        const barber = barbers.find(b => b._id === reservation.barberId._id);
                                        barberName = barber ? barber.name : '—';
                                    }
                                }

                                const serviceName = reservation.serviceId && reservation.serviceId.name
                                    ? reservation.serviceId.name
                                    : '—';

                                const clientLine = [
                                    reservation.clientName,
                                    reservation.clientPhone,
                                    reservation.clientEmail
                                ].filter(Boolean).join(' • ');

                                html += `
                                    <div class="reservation-card">
                                        <div class="reservation-time">${reservation.timeSlot || '--:--'}</div>
                                        <div>
                                            <div class="reservation-service">${serviceName}</div>
                                            <div class="reservation-meta">Barbeiro: ${barberName}</div>
                                            <div class="reservation-meta">Cliente: ${clientLine}</div>
                                        </div>
                                        <div class="reservation-status"></div>
                                        <div class="reservation-actions">
                                            <button class="btn-action btn-cancel" onclick="cancelReservation('${reservation._id}')">Cancelar</button>
                                        </div>
                                    </div>
                                `;
                            });

                        html += `
                                </div>
                            </div>
                        `;
                    });

                    return html;
                };

                container.innerHTML = buildReservationsHtml(reservations);

                const attachReservationsFilter = () => {
                    if (currentUser.role !== 'admin') return;
                    const applyButton = document.getElementById('reservationsApply');
                    if (!applyButton) return;

                    applyButton.addEventListener('click', async () => {
                        const barberId = document.getElementById('reservationsBarberFilter').value;
                        const url = barberId
                            ? `${API_URL}/admin/reservations?barberId=${barberId}`
                            : `${API_URL}/admin/reservations`;

                        const refreshData = await fetchJson(url, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });

                        const updatedOptions = buildBarberOptions(barbers, barberId);
                        container.innerHTML = buildReservationsHtml(refreshData);
                        const filterSelect = document.getElementById('reservationsBarberFilter');
                        if (filterSelect) {
                            filterSelect.innerHTML = updatedOptions;
                        }
                        attachReservationsFilter();
                    });
                };

                attachReservationsFilter();
            } catch (error) {
                container.innerHTML = `<div class="alert alert-error">Erro ao carregar reservas: ${error.message}</div>`;
            }
        }

                function editReviewForm(review, allReviews) {
                    const container = document.getElementById('reviewsContainer');

                    if (before) {

                    form.querySelector('.save-review-btn').addEventListener('click', async () => {

                async function saveReview(author, rating, text, reviewId) {
                    if (!author || !rating || !text) {
                        showStatusModal('Por favor, preencha todos os campos', 'error');
                        return;
                    }

                    const method = reviewId ? 'PUT' : 'POST';
                    const url = reviewId ? `${API_URL}/admin/reviews/${reviewId}` : `${API_URL}/admin/reviews`;

                    try {
                        await fetchJson(url, {
                            method,
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                author,
                                rating: parseInt(rating),
                                text,
                                date: new Date().toISOString(),
                                isActive: true
                            })
                        });

                        showStatusModal(reviewId ? 'Review atualizada!' : 'Review adicionada!', 'success');
                    } catch (error) {
                        showStatusModal('Erro ao guardar review: ' + error.message, 'error');
                    }
                }
            } catch (error) {
                container.innerHTML = `<div class="alert alert-error">Erro ao carregar configurações: ${error.message}</div>`;
            }
        }

        function showAlert(targetId, message, type) {
            const alert = document.getElementById(targetId);
            if (!alert) return;
            alert.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alert.innerHTML = '';
            }, 5000);
        }

        function showStatusModal(message, type) {
            const modal = document.getElementById('statusModal');
            const title = document.getElementById('statusModalTitle');
            const body = document.getElementById('statusModalMessage');
            if (!modal || !title || !body) return;

            modal.setAttribute('data-type', type);
            title.textContent = type === 'success' ? 'Sucesso' : 'Erro';
            body.textContent = message || '';
            modal.classList.add('active');
        }

        function closeStatusModal() {
            const modal = document.getElementById('statusModal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

                            <small style="color: var(--text-light); display: block; margin-top: 0.25rem;">Mínimo 6 caracteres</small>
                        </div>
                        <div class="form-group">
                            <label>Confirmar Nova Password</label>
                            <input type="password" id="confirmPassword" required autocomplete="new-password" minlength="6" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px;">
                        </div>
                        <button type="submit" style="background: var(--accent); color: white; border: none; padding: 0.75rem 2rem; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='#e55a24'" onmouseout="this.style.background='var(--accent)'">
                            Alterar Password
                        </button>
                    </form>
                </div>
            `;

            setupChangePasswordForm();
        }

        async function setupChangePasswordForm() {
            const form = document.getElementById('changePasswordForm');
            if (!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    showStatusModal('As passwords não coincidem', 'error');
                    return;
                }

                if (newPassword.length < 6) {
                    showStatusModal('A password deve ter pelo menos 6 caracteres', 'error');
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/auth/change-password`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ currentPassword, newPassword })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Erro ao alterar password');
                    }

                    showStatusModal('Password alterada com sucesso!', 'success');
                    form.reset();
                } catch (error) {
                    showStatusModal(error.message, 'error');
                }
            });
        }

        function logout() {
            localStorage.clear();
            token = null;
            currentUser = {};
            showLoginPage();
        }
    </script>
</body>

</html>
